<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMC MARKETS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
    <style>
      html, body {
        margin: 0; padding: 0; background: #050300; overflow: hidden;
        cursor: crosshair;
      }
      canvas { display: block; }

      .marquee-container {
        position: fixed; left: 0; bottom: 0; width: 100%;
        overflow: hidden; white-space: nowrap;
        background: #000; border-top: 2px solid #39ff14;
        font: 18px "Courier New", monospace; letter-spacing: 1px;
        padding: 6px 0; z-index: 10; pointer-events: none;
      }
      .marquee {
        display: inline-flex; gap: 38px;
        will-change: transform;
        animation: ticker 60s linear infinite;
      }
      @keyframes ticker {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      .commodity { display: inline-flex; gap: 8px; align-items: baseline; }
      .commodity .name { color: #39ff14; text-transform: uppercase; }
      .commodity .price { color: #cfcfcf; }
      .commodity .change.positive { color: #39ff14; }
      .commodity .change.negative { color: #ff00c8; }
    </style>
  </head>
  <body>
    <div class="marquee-container">
      <div class="marquee" id="marquee"></div>
    </div>

    <script>
   const COMMODITIES = [
      ["Gold", "$2345.67", "+12.34"],
      ["Silver", "$28.45", "-0.23"],
      ["Platinum", "$987.65", "+5.67"],
      ["Palladium", "$1234.56", "-8.90"],
      ["Copper", "$4.56", "+0.12"],
      ["Aluminum", "$2.34", "-0.05"],
      ["Zinc", "$3.45", "+0.07"],
      ["Nickel", "$18.90", "-0.45"],
      ["Lead", "$2.12", "+0.03"],
      ["Tin", "$25.67", "-0.34"],
      ["(ノಠ益ಠ)ノ彡┻━┻", "$0.00", "-0.00"],
      ["Iron Ore", "$123.45", "+2.34"],
      ["Steel", "$789.01", "-5.67"],
      ["Natural Gas", "$3.45", "+0.12"],
      ["Crude Oil", "$78.90", "-1.23"],
      ["Brent Oil", "$82.34", "+0.45"],
      ["Gold Futures", "$2245.67", "+2.34"],
      ["Uranium", "$12344.45", "+22.34"],
      ["Soy beans", "$14.45", "-1.34"],
      ["_(ツ)_/¯", "$100", "+0.00"],
      ["Corn", "$5.67", "+0.23"],
      ["Wheat", "$6.78", "-0.12"],
      ["Why are you looking at this", "$999.99", "+99.99"],
      ["Coffee", "$1.23", "+0.05"],
      ["Cocoa", "$2.34", "-0.07"],
      ["Sugar", "$0.56", "+0.01"],
      ["Cotton", "$0.78", "-0.03"],
      ["Unobtainium", "$99999.99", "+0.00"],
      ["(╯°□°）╯︵ ┻━┻", "$0.00", "-0.00"],
      ["Left Socks", "$0.10", "-0.01"],
      ["Empty Promises", "$0.00", "+0.00"],
      ["Infinite Loop", "∞", "+0.00"],
      ["Wait, is this even a commodity?", "$0.00", "+0.00"],
      ["Lumber", "$345.67", "+15.89"],
      ["Rubber", "$0.89", "-0.02"],
      ["(╯°□°）╯︵ ┻━┻", "$0.01", "-0.01"],
      ["Available for funerals for cheap", "$20", "+1"],
      ["Lithium", "$1234.56", "+45.67"],
      ["Cobalt", "$5678.90", "-123.45"],
      ["( ͡° ͜ʖ ͡°)", "$10", "+0.01"],
      ["(idk what else to put here)", "$10", "+0.01"],
      ["In my restless dreams", "0", "0"],
      ["I see that town", "0", "0"],
      ["Silent Hill", "0", "0"],
      ["Your AD Here", "0", "0"]
    ];  

      function commodityHTML([name, price, change]) {
        const dir = change.startsWith("-") ? "negative" : "positive";
        return `<div class="commodity"><span class="name">${name}</span>` +
               `<span class="price">${price}</span>` +
               `<span class="change ${dir}">${change}</span></div>`;
      }

      // duplicate the list so the -50% translate loops seamlessly
      const items = COMMODITIES.map(commodityHTML).join("");
      document.getElementById("marquee").innerHTML = items + items;
    </script>

    <script src="vis.js"></script>
  </body>
</html>
